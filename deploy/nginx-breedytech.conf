# Installed to /etc/nginx/sites-available/breedytech by deploy-remote.sh
# HTTP -> HTTPS redirect + HTTPS -> Next.js (PM2) on 127.0.0.1:3000

server {
    listen 80;
    listen [::]:80;
    server_name zobbi-gear.store www.zobbi-gear.store;

    return 301 https://$host$request_uri;
}

# Fallback: plain HTTP for direct IP access (no SSL)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name zobbi-gear.store www.zobbi-gear.store;

    ssl_certificate     /etc/letsencrypt/live/zobbi-gear.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zobbi-gear.store/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
